name: WatchPod
options:
  bundleIdPrefix: jp.1qaz
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: REDACTED
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: YES
    GENERATE_INFOPLIST_FILE: YES

targets:
  WatchPod:
    type: application
    platform: iOS
    sources:
      - path: WatchPod
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.1qaz.WatchPod
        PRODUCT_NAME: WatchPod
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: WatchPod
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - target: WatchPod Watch App
        embed: true
        codeSign: true

  WatchPod Watch App:
    type: application
    platform: watchOS
    sources:
      - path: "WatchPod Watch App"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.1qaz.WatchPod.watchkitapp
        PRODUCT_NAME: WatchPod
        TARGETED_DEVICE_FAMILY: 4
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: jp.1qaz.WatchPod
        INFOPLIST_KEY_CFBundleDisplayName: WatchPod
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
